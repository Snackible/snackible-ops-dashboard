<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snackible Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-lg shadow">
            <h1 class="text-3xl font-bold text-gray-800">🚀 Snackible Operations Live</h1>
            
            <div class="flex items-center space-x-4 mt-4 md:mt-0">
                <select id="weekFilter" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 hidden cursor-pointer font-semibold shadow-sm">
                    <option value="All">All-Time Data</option>
                </select>

                <div class="text-sm font-semibold text-gray-600 bg-gray-100 px-4 py-2 rounded-full flex items-center shadow-inner">
                    <span id="status-dot" class="h-3 w-3 rounded-full bg-yellow-400 mr-2 animate-pulse"></span>
                    <span id="status-text">Connecting to API...</span>
                </div>
            </div>
        </div>

        <div id="loading-screen" class="flex flex-col items-center justify-center py-32">
            <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-24 w-24 mb-6"></div>
            <h2 class="text-2xl font-semibold text-gray-700">Crunching the latest numbers...</h2>
            <p class="text-gray-500 mt-2">Fetching live data directly from the 2026 Ecom Sheet.</p>
        </div>

        <div id="dashboard-content" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8" id="kpi-container">
                </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                    <h3 class="text-lg font-bold mb-4 text-gray-700 text-center">GMV Trend (All-Time)</h3>
                    <div class="relative h-64"><canvas id="gmvChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                    <h3 id="statusTitle" class="text-lg font-bold mb-4 text-gray-700 text-center">Order Statuses</h3>
                    <div class="relative h-64"><canvas id="statusChart"></canvas></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-purple-500">
                    <h3 id="channelTitle" class="text-lg font-bold mb-4 text-gray-700 text-center">GMV by Channel</h3>
                    <div class="relative h-64"><canvas id="channelChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-orange-500">
                    <h3 id="courierTitle" class="text-lg font-bold mb-4 text-gray-700 text-center">Avg Courier TAT (Days)</h3>
                    <div class="relative h-64"><canvas id="courierChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // YOUR API URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzre4BMyXYa9M71QNWKe5qFHSOfPnLaaz7P5pjqpMxPFtZo6lDjcDisaGVQuV7HCK0/exec";
        
        const COLORS = {
            Hot: '#E07B39', KK: '#6A4C93', Scootsy: '#1D8A99', Amazon: '#FBAE25', 
            BB: '#457B9D', B2B: '#2D6A4F', GT: '#52B788', MT: '#9B59B6', 
            FC: '#E17055', Others: '#95A5A6', Unknown: '#CBD5E1'
        };

        let chartInstances = {};
        let GLOBAL_DATA = {}; // Stores fetched data

        async function fetchLiveData() {
            try {
                const response = await fetch(API_URL);
                GLOBAL_DATA = await response.json();
                if (GLOBAL_DATA.error) throw new Error(GLOBAL_DATA.error);
                
                // Hide loader, show dashboard
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('weekFilter').classList.remove('hidden');
                
                // Update status indicator
                document.getElementById('status-dot').classList.replace('bg-yellow-400', 'bg-green-500');
                document.getElementById('status-dot').classList.remove('animate-pulse');
                document.getElementById('status-text').innerText = "Live Data Synced";

                populateDropdown();
                renderGMVTrend(); // Draw all-time trend once
                renderDashboard('All'); // Initial render
            } catch (error) {
                console.error(error);
                document.getElementById('status-dot').classList.replace('bg-yellow-400', 'bg-red-500');
                document.getElementById('status-text').innerText = "Sync Failed";
            }
        }

        function populateDropdown() {
            const select = document.getElementById('weekFilter');
            const weeks = Object.keys(GLOBAL_DATA).sort().reverse(); // Newest weeks at the top
            
            weeks.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.innerText = "Week of " + w;
                select.appendChild(opt);
            });

            // Listen for changes
            select.addEventListener('change', (e) => {
                renderDashboard(e.target.value);
            });
        }

        function renderGMVTrend() {
            const weeks = Object.keys(GLOBAL_DATA).sort();
            createChart('gmvChart', 'line', {
                labels: weeks,
                datasets: [{
                    label: 'GMV Generated',
                    data: weeks.map(w => GLOBAL_DATA[w].gmv),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            });
        }

        function renderDashboard(selectedWeek) {
            let totalGMV = 0, totalOrders = 0;
            let totalFillRate = 0, fillRateCount = 0;
            let totalTAT = 0, tatCount = 0;
            let statuses = {}, channels = {}, couriers = {};

            const weeksToProcess = selectedWeek === 'All' ? Object.keys(GLOBAL_DATA) : [selectedWeek];

            // Calculate aggregations based on filter
            weeksToProcess.forEach(w => {
                let weekData = GLOBAL_DATA[w];
                totalGMV += weekData.gmv;
                totalOrders += weekData.orders;
                
                if(weekData.avg_fill > 0) { totalFillRate += weekData.avg_fill; fillRateCount++; }
                if(weekData.avg_tat > 0) { totalTAT += weekData.avg_tat; tatCount++; }

                for (let [s, count] of Object.entries(weekData.statuses)) {
                    statuses[s] = (statuses[s] || 0) + count;
                }
                for (let [c, val] of Object.entries(weekData.channels)) {
                    channels[c] = (channels[c] || 0) + val;
                }
                for (let [c, cData] of Object.entries(weekData.couriers)) {
                    if(!couriers[c]) couriers[c] = { orders: 0, _tatSum: 0, _tatCount: 0 };
                    couriers[c].orders += cData.orders;
                    if(cData.avg_tat > 0) {
                        couriers[c]._tatSum += cData.avg_tat * cData.orders; 
                        couriers[c]._tatCount += cData.orders;
                    }
                }
            });

            // Format final KPI values
            let avgFill = fillRateCount > 0 ? (totalFillRate / fillRateCount).toFixed(1) : 0;
            let avgTatTotal = tatCount > 0 ? (totalTAT / tatCount).toFixed(1) : 0;
            let rtoPct = totalOrders > 0 ? (((statuses["RTO"] || 0) / totalOrders) * 100).toFixed(1) : 0;

            // Inject KPIs
            const kpis = [
                { label: "GMV Generated", value: "₹" + totalGMV.toLocaleString('en-IN') },
                { label: "Orders Processed", value: totalOrders.toLocaleString('en-IN') },
                { label: "Avg Fill Rate", value: avgFill + "%" },
                { label: "Avg Delivery TAT", value: avgTatTotal + " Days" },
                { label: "RTO Rate", value: rtoPct + "%" }
            ];

            document.getElementById('kpi-container').innerHTML = kpis.map(k => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-center">
                    <p class="text-xs tracking-wider text-gray-500 uppercase font-semibold mb-1">${k.label}</p>
                    <p class="text-2xl font-black text-gray-800">${k.value}</p>
                </div>
            `).join('');

            // Update Chart Titles based on filter
            const titleSuffix = selectedWeek === 'All' ? '(All-Time)' : `(${selectedWeek})`;
            document.getElementById('statusTitle').innerText = `Order Statuses ${titleSuffix}`;
            document.getElementById('channelTitle').innerText = `GMV by Channel ${titleSuffix}`;
            document.getElementById('courierTitle').innerText = `Avg Courier TAT ${titleSuffix}`;

            // Draw Filtered Charts
            createChart('statusChart', 'doughnut', {
                labels: Object.keys(statuses),
                datasets: [{
                    data: Object.values(statuses),
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#6b7280', '#3b82f6', '#8b5cf6', '#eab308', '#ec4899', '#06b6d4']
                }]
            });

            createChart('channelChart', 'bar', {
                labels: Object.keys(channels),
                datasets: [{
                    label: 'Total GMV',
                    data: Object.values(channels),
                    backgroundColor: Object.keys(channels).map(c => COLORS[c] || COLORS.Others),
                    borderRadius: 4
                }]
            });

            let courierLabels = [];
            let courierTatData = [];
            for(let c in couriers) {
                if(couriers[c]._tatCount > 0) {
                    courierLabels.push(c);
                    courierTatData.push((couriers[c]._tatSum / couriers[c]._tatCount).toFixed(1));
                }
            }

            createChart('courierChart', 'bar', {
                labels: courierLabels,
                datasets: [{
                    label: 'Average TAT (Days)',
                    data: courierTatData,
                    backgroundColor: '#f97316',
                    borderRadius: 4
                }]
            });
        }

        // Chart.js helper
        function createChart(canvasId, type, data) {
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            const ctx = document.getElementById(canvasId).getContext('2d');
            chartInstances[canvasId] = new Chart(ctx, {
                type: type,
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: type === 'doughnut' ? 'right' : 'top' }
                    }
                }
            });
        }

        window.onload = fetchLiveData;
    </script>
</body>
</html>
